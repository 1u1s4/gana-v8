name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "integration/**"
      - "slice/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

      - name: Upload CI diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            .turbo/**
            **/.turbo/**
            pnpm-debug.log
            **/pnpm-debug.log
